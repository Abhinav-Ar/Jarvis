name: ORION checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: ORION_PYTHON="$(command -v python)" ./scripts/check.sh
